name: Lint and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.14.4

      - name: Lint — combo mode (default)
        run: helm lint . --strict --values ci/default-values.yaml

      - name: Lint — distributed mode
        run: helm lint . --strict --values ci/distributed-values.yaml

      - name: Template — combo mode
        run: helm template clair . --values ci/default-values.yaml > /dev/null

      - name: Template — distributed mode
        run: helm template clair . --values ci/distributed-values.yaml > /dev/null

      - name: Template — notifier disabled (combo)
        run: helm template clair . --set combo.notifier.enabled=false > /dev/null

      - name: Template — notifier disabled (distributed)
        run: >
          helm template clair .
          --values ci/distributed-values.yaml
          --set distributed.notifier.enabled=false
          > /dev/null

      - name: Template — external database
        run: >
          helm template clair .
          --set postgresql.enabled=false
          --set database.externalConnString="host=db port=5432 dbname=clair user=clair password=test sslmode=disable"
          > /dev/null

      - name: Template — autoscaling enabled (distributed)
        run: >
          helm template clair .
          --values ci/distributed-values.yaml
          --set distributed.indexer.autoscaling.enabled=true
          --set distributed.matcher.autoscaling.enabled=true
          > /dev/null

      - name: Validate schema rejects bad mode
        run: "! helm template clair . --set mode=invalid 2>/dev/null"

      - name: Validate schema rejects bad logLevel
        run: "! helm template clair . --set config.logLevel=invalid 2>/dev/null"

      - name: Validate schema rejects zero replicas
        run: "! helm template clair . --set combo.replicaCount=0 2>/dev/null"
