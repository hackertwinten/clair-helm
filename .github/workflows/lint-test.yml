name: Lint and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Lint — default values
        run: helm lint . --strict --values ci/default-values.yaml

      - name: Lint — operator mode
        run: helm lint . --strict --values ci/operator-values.yaml

      - name: Template — default values
        run: helm template clair . --values ci/default-values.yaml > /dev/null

      - name: Template — operator mode
        run: helm template clair . --values ci/operator-values.yaml > /dev/null

      - name: Template — notifier disabled
        run: helm template clair . --set notifier.enabled=false > /dev/null

      - name: Template — external database
        run: |
          helm template clair . \
            --set postgresql.enabled=false \
            --set database.externalConnString="host=db port=5432 dbname=clair user=clair password=test sslmode=disable" \
            > /dev/null

      - name: Validate schema rejects bad input
        run: |
          ! helm template clair . --set mode=invalid 2>/dev/null
          ! helm template clair . --set config.logLevel=invalid 2>/dev/null
          ! helm template clair . --set replicaCount=0 2>/dev/null
