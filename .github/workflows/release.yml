name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Get chart version
        id: chart
        run: |
          echo "version=$(helm show chart . | grep '^version:' | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "name=$(helm show chart . | grep '^name:' | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: helm package . --destination .packages

      - name: Create GitHub Release (skip if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $TAG already exists, skipping."
          else
            gh release create "$TAG" .packages/*.tgz \
              --title "$TAG" \
              --notes "Helm chart ${{ steps.chart.outputs.name }} version ${{ steps.chart.outputs.version }}"
          fi

      - name: Update Helm repo index on gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

          # Check out gh-pages into a worktree
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages

          CHART_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${{ github.event.repository.name }}"

          # Merge new package into existing index (or create fresh)
          if [ -f /tmp/gh-pages/index.yaml ]; then
            helm repo index .packages --url "$CHART_URL" --merge /tmp/gh-pages/index.yaml
          else
            helm repo index .packages --url "$CHART_URL"
          fi

          cp .packages/index.yaml /tmp/gh-pages/index.yaml

          cd /tmp/gh-pages
          git add index.yaml
          git diff --staged --quiet && echo "index.yaml unchanged" && exit 0
          git commit -m "Update index.yaml for ${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}"
          git push origin gh-pages
