name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.14.4

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          # helm sign requires the legacy secring.gpg format
          gpg --export-secret-keys >~/.gnupg/secring.gpg

      - name: Get chart version
        id: chart
        run: |
          echo "version=$(helm show chart . | grep '^version:' | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "name=$(helm show chart . | grep '^name:' | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Package and sign chart
        run: |
          helm package . --destination .packages \
            --sign \
            --key "hackertwinten" \
            --keyring ~/.gnupg/secring.gpg

      - name: Create GitHub Release (skip if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHART_NAME: ${{ steps.chart.outputs.name }}
          CHART_VERSION: ${{ steps.chart.outputs.version }}
        run: |
          TAG="${CHART_NAME}-${CHART_VERSION}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $TAG already exists, skipping."
          else
            gh release create "$TAG" .packages/*.tgz .packages/*.prov \
              --title "$TAG" \
              --notes "Helm chart ${CHART_NAME} version ${CHART_VERSION}"
          fi

      - name: Update Helm repo index on gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHART_NAME: ${{ steps.chart.outputs.name }}
          CHART_VERSION: ${{ steps.chart.outputs.version }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages

          CHART_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"

          if [ -f /tmp/gh-pages/index.yaml ]; then
            helm repo index .packages --url "$CHART_URL" --merge /tmp/gh-pages/index.yaml
          else
            helm repo index .packages --url "$CHART_URL"
          fi

          cp .packages/index.yaml /tmp/gh-pages/index.yaml

          cd /tmp/gh-pages
          git add index.yaml
          git diff --staged --quiet && echo "index.yaml unchanged" && exit 0
          git commit -m "Update index.yaml for ${CHART_NAME}-${CHART_VERSION}"
          git push origin HEAD:gh-pages
