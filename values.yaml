# -- Deployment mode: "combo" (all-in-one) or "distributed" (separate pods per component)
mode: combo

nameOverride: ""
fullnameOverride: ""

# ──────────────────────────────────────────────
# Clair image (shared across all modes)
# ──────────────────────────────────────────────
image:
  repository: quay.io/projectquay/clair
  tag: "4.7.4"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}

# ──────────────────────────────────────────────
# Clair configuration (applied to all modes)
# ──────────────────────────────────────────────
config:
  logLevel: info
  httpListenAddr: "0.0.0.0:6060"
  introspectionAddr: "0.0.0.0:8089"

  indexer:
    scanLockRetry: 10
    layerScanConcurrency: 5
    migrations: true
    airgap: false

  matcher:
    maxConnPool: 100
    migrations: true
    period: "6h"
    disableUpdaters: false
    updateRetention: 2

  notifier:
    migrations: true
    pollInterval: "5m"
    deliveryInterval: "1m"
    webhook:
      target: ""
      callback: ""
      signed: false
    # amqp: {}
    # stomp: {}

  # Optional PSK auth between Clair components
  auth: {}
    # psk:
    #   key: "changeme"
    #   iss: ["indexer", "matcher"]

# ──────────────────────────────────────────────
# Database
# ──────────────────────────────────────────────
database:
  # Full PostgreSQL DSN. Leave empty to use bundled postgresql.
  externalConnString: ""
  name: clair
  user: clair
  # Leave empty to auto-generate. Persisted across upgrades via Secret lookup.
  password: ""

# ──────────────────────────────────────────────
# Bundled PostgreSQL (used by both modes)
# ──────────────────────────────────────────────
postgresql:
  enabled: true

  image:
    repository: postgres
    tag: "15-alpine"
    pullPolicy: IfNotPresent

  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce

  resources: {}

  service:
    port: 5432

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false

# ──────────────────────────────────────────────
# Combo mode  (mode: combo)
# Single process running indexer + matcher + optional separate notifier.
# ──────────────────────────────────────────────
combo:
  replicaCount: 1
  resources: {}

  service:
    type: ClusterIP
    port: 6060
    introspectionPort: 8089

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: clair.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

  pdb:
    enabled: false
    minAvailable: 1

  # Deploy a separate notifier pod (CLAIR_MODE=notifier).
  # When disabled, notifier runs inside the main combo process.
  notifier:
    enabled: true
    replicaCount: 1
    resources: {}
    service:
      type: ClusterIP
      port: 6060

# ──────────────────────────────────────────────
# Distributed mode  (mode: distributed)
# Separate Deployment per component with path-based Ingress routing.
# Requires a Layer 7 ingress controller.
# ──────────────────────────────────────────────
distributed:
  # Ingress is effectively required in distributed mode.
  ingress:
    enabled: true
    className: ""
    annotations: {}
    host: clair.example.com
    tls: []

  indexer:
    replicaCount: 2
    resources: {}
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80

  matcher:
    replicaCount: 2
    resources: {}
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80

  notifier:
    enabled: true
    replicaCount: 1
    resources: {}
