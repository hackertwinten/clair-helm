{{- if eq .Values.mode "deployment" -}}
{{- $dbPassword := include "clair.dbPassword" . -}}
{{- $connString := include "clair.connString" . -}}
---
# Secret: database credentials (shared by PostgreSQL and Clair config)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clair.fullname" . }}-db
  labels:
    {{- include "clair.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ $dbPassword | quote }}
---
# Secret: full Clair config (contains credentials — not a ConfigMap)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clair.fullname" . }}-config
  labels:
    {{- include "clair.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    http_listen_addr: {{ .Values.config.httpListenAddr | quote }}
    introspection_addr: {{ .Values.config.introspectionAddr | quote }}
    log_level: {{ .Values.config.logLevel }}
    {{- with .Values.config.auth }}
    auth:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    indexer:
      connstring: {{ $connString | quote }}
      scanlock_retry: {{ .Values.config.indexer.scanLockRetry }}
      layer_scan_concurrency: {{ .Values.config.indexer.layerScanConcurrency }}
      migrations: {{ .Values.config.indexer.migrations }}
      airgap: {{ .Values.config.indexer.airgap }}
    matcher:
      connstring: {{ $connString | quote }}
      max_conn_pool: {{ .Values.config.matcher.maxConnPool }}
      migrations: {{ .Values.config.matcher.migrations }}
      period: {{ .Values.config.matcher.period | quote }}
      disable_updaters: {{ .Values.config.matcher.disableUpdaters }}
      update_retention: {{ .Values.config.matcher.updateRetention }}
    {{- if and .Values.notifier.enabled (eq .Values.config.mode "combo") }}
    notifier:
      connstring: {{ $connString | quote }}
      migrations: {{ .Values.notifier.config.migrations }}
      indexer_addr: {{ include "clair.notifier.indexerAddr" . | quote }}
      matcher_addr: {{ include "clair.notifier.matcherAddr" . | quote }}
      poll_interval: {{ .Values.notifier.config.pollInterval | quote }}
      delivery_interval: {{ .Values.notifier.config.deliveryInterval | quote }}
      {{- if .Values.notifier.config.webhook.target }}
      webhook:
        target: {{ .Values.notifier.config.webhook.target | quote }}
        callback: {{ .Values.notifier.config.webhook.callback | quote }}
        signed: {{ .Values.notifier.config.webhook.signed }}
      {{- end }}
    {{- end }}
{{- if .Values.notifier.enabled }}
---
# Secret: notifier-mode config (used by the separate notifier Deployment)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clair.fullname" . }}-notifier-config
  labels:
    {{- include "clair.labels" . | nindent 4 }}
    app.kubernetes.io/component: notifier
type: Opaque
stringData:
  config.yaml: |
    http_listen_addr: "0.0.0.0:{{ .Values.notifier.service.port }}"
    introspection_addr: "0.0.0.0:8089"
    log_level: {{ .Values.config.logLevel }}
    notifier:
      connstring: {{ $connString | quote }}
      migrations: {{ .Values.notifier.config.migrations }}
      indexer_addr: {{ include "clair.notifier.indexerAddr" . | quote }}
      matcher_addr: {{ include "clair.notifier.matcherAddr" . | quote }}
      poll_interval: {{ .Values.notifier.config.pollInterval | quote }}
      delivery_interval: {{ .Values.notifier.config.deliveryInterval | quote }}
      {{- if .Values.notifier.config.webhook.target }}
      webhook:
        target: {{ .Values.notifier.config.webhook.target | quote }}
        callback: {{ .Values.notifier.config.webhook.callback | quote }}
        signed: {{ .Values.notifier.config.webhook.signed }}
      {{- end }}
{{- end }}
{{- end }}
