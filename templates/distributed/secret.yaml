{{- if eq .Values.mode "distributed" -}}
{{- $dbPassword := include "clair.dbPassword" . -}}
{{- $connString := include "clair.connString" . -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clair.fullname" . }}-db
  labels:
    {{- include "clair.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ $dbPassword | quote }}
---
# Shared config for all distributed components (CLAIR_MODE selects which section is used).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clair.fullname" . }}-config
  labels:
    {{- include "clair.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    http_listen_addr: {{ .Values.config.httpListenAddr | quote }}
    introspection_addr: {{ .Values.config.introspectionAddr | quote }}
    log_level: {{ .Values.config.logLevel }}
    {{- with .Values.config.auth }}
    auth:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    indexer:
      connstring: {{ $connString | quote }}
      scanlock_retry: {{ .Values.config.indexer.scanLockRetry }}
      layer_scan_concurrency: {{ .Values.config.indexer.layerScanConcurrency }}
      migrations: {{ .Values.config.indexer.migrations }}
      airgap: {{ .Values.config.indexer.airgap }}
    matcher:
      connstring: {{ $connString | quote }}
      max_conn_pool: {{ .Values.config.matcher.maxConnPool }}
      migrations: {{ .Values.config.matcher.migrations }}
      period: {{ .Values.config.matcher.period | quote }}
      disable_updaters: {{ .Values.config.matcher.disableUpdaters }}
      update_retention: {{ .Values.config.matcher.updateRetention }}
      indexer_addr: {{ include "clair.indexerAddr" . | quote }}
    {{- if .Values.distributed.notifier.enabled }}
    notifier:
      connstring: {{ $connString | quote }}
      migrations: {{ .Values.config.notifier.migrations }}
      indexer_addr: {{ include "clair.indexerAddr" . | quote }}
      matcher_addr: {{ include "clair.matcherAddr" . | quote }}
      poll_interval: {{ .Values.config.notifier.pollInterval | quote }}
      delivery_interval: {{ .Values.config.notifier.deliveryInterval | quote }}
      {{- if .Values.config.notifier.webhook.target }}
      webhook:
        target: {{ .Values.config.notifier.webhook.target | quote }}
        callback: {{ .Values.config.notifier.webhook.callback | quote }}
        signed: {{ .Values.config.notifier.webhook.signed }}
      {{- end }}
    {{- end }}
{{- end }}
