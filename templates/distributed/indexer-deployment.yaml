{{- if eq .Values.mode "distributed" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clair.fullname" . }}-indexer
  labels:
    {{- include "clair.labels" . | nindent 4 }}
    app.kubernetes.io/component: indexer
spec:
  {{- if not .Values.distributed.indexer.autoscaling.enabled }}
  replicas: {{ .Values.distributed.indexer.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "clair.indexer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: indexer
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/distributed/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "clair.indexer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: indexer
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clair.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - until nc -z {{ include "clair.postgresHost" . }} {{ .Values.postgresql.service.port }}; do echo "waiting for postgres"; sleep 2; done
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      {{- end }}
      containers:
        - name: indexer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-conf", "/etc/clair/config.yaml"]
          env:
            - name: CLAIR_MODE
              value: indexer
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 6060
              protocol: TCP
            - name: introspection
              containerPort: 8089
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: introspection
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: introspection
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/clair
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: vartmp
              mountPath: /var/tmp
          {{- with .Values.distributed.indexer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          secret:
            secretName: {{ include "clair.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        - name: vartmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
