{{- if and (eq .Values.mode "distributed") .Values.distributed.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "clair.fullname" . }}
  labels:
    {{- include "clair.labels" . | nindent 4 }}
  {{- with .Values.distributed.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.distributed.ingress.className }}
  ingressClassName: {{ .Values.distributed.ingress.className }}
  {{- end }}
  {{- if .Values.distributed.ingress.tls }}
  tls:
    {{- toYaml .Values.distributed.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.distributed.ingress.host | quote }}
      http:
        paths:
          - path: /indexer
            pathType: Prefix
            backend:
              service:
                name: {{ include "clair.fullname" . }}-indexer
                port:
                  name: http
          - path: /matcher
            pathType: Prefix
            backend:
              service:
                name: {{ include "clair.fullname" . }}-matcher
                port:
                  name: http
          {{- if .Values.distributed.notifier.enabled }}
          - path: /notifier
            pathType: Prefix
            backend:
              service:
                name: {{ include "clair.fullname" . }}-notifier
                port:
                  name: http
          {{- end }}
{{- end }}
