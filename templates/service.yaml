{{- if eq .Values.mode "combo" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clair.fullname" . }}
  labels:
    {{- include "clair.labels" . | nindent 4 }}
    app.kubernetes.io/component: combo
spec:
  type: {{ .Values.combo.service.type }}
  selector:
    {{- include "clair.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: combo
  ports:
    - name: http
      port: {{ .Values.combo.service.port }}
      targetPort: http
      protocol: TCP
    - name: introspection
      port: {{ .Values.combo.service.introspectionPort }}
      targetPort: introspection
      protocol: TCP
{{- end }}
