{{- if and (eq .Values.mode "deployment") .Values.notifier.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clair.fullname" . }}-notifier
  labels:
    {{- include "clair.labels" . | nindent 4 }}
    app.kubernetes.io/component: notifier
spec:
  type: {{ .Values.notifier.service.type }}
  selector:
    {{- include "clair.notifier.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: notifier
  ports:
    - name: http
      port: {{ .Values.notifier.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
