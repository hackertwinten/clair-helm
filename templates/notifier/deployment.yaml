{{- if and (eq .Values.mode "combo") .Values.combo.notifier.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clair.fullname" . }}-notifier
  labels:
    {{- include "clair.labels" . | nindent 4 }}
    app.kubernetes.io/component: notifier
spec:
  replicas: {{ .Values.combo.notifier.replicaCount }}
  selector:
    matchLabels:
      {{- include "clair.notifier.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: notifier
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "clair.notifier.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: notifier
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clair.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-clair
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "clair.fullname" . }} {{ .Values.combo.service.port }}; do
                echo "Waiting for Clair..."; sleep 2
              done
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: notifier
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /clair
            - -conf
            - /etc/clair/config.yaml
          env:
            - name: CLAIR_MODE
              value: notifier
          ports:
            - name: http
              containerPort: {{ .Values.combo.notifier.service.port }}
              protocol: TCP
            - name: introspection
              containerPort: 8089
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: introspection
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: introspection
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/clair
              readOnly: true
            - name: tmp
              mountPath: /tmp
          {{- with .Values.combo.notifier.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          secret:
            secretName: {{ include "clair.fullname" . }}-notifier-config
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
