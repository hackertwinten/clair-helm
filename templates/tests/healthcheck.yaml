{{- if eq .Values.mode "combo" }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "clair.fullname" . }}-test-health
  labels:
    {{- include "clair.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
  containers:
    - name: healthcheck
      image: busybox:1.37.0
      command:
        - sh
        - -c
        - |
          until wget -qO- http://{{ include "clair.fullname" . }}:{{ .Values.combo.service.introspectionPort }}/healthz; do
            echo "waiting for clair..."; sleep 3
          done
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
